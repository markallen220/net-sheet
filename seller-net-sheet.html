<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Seller Net Sheet — Mark Allen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#080A0E;
    --panel:#11151C;
    --panel-2:#171C25;
    --line:rgba(96,165,250,0.18);
    --line-soft:rgba(255,255,255,0.06);
    --text:#ECEFF4;
    --muted:#8C929C;
    --faint:#6B7079;
    --accent:#60A5FA;
    --accent-soft:rgba(96,165,250,0.10);
    --bad:#E25949;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    color:var(--text);
    font-feature-settings:"tnum" 1,"cv01" 1;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:28px 18px 64px;}

  /* header */
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.01em;margin:6px 0 0;}
  .addr{
    margin-top:16px;width:100%;background:transparent;border:none;border-bottom:1px solid var(--line-soft);
    color:var(--text);font-family:'Inter',sans-serif;font-size:15px;padding:8px 2px;outline:none;
  }
  .addr::placeholder{color:var(--faint);}
  .addr:focus{border-bottom-color:var(--accent);}
  .prepared{font-size:11px;color:var(--faint);margin-top:8px;letter-spacing:.02em;}

  /* hero */
  .hero{
    margin:22px 0 8px;padding:26px 22px;border-radius:18px;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);position:relative;overflow:hidden;
  }
  .hero::after{content:"";position:absolute;inset:0;border-radius:18px;
    box-shadow:0 0 60px -12px rgba(96,165,250,0.20) inset;pointer-events:none;}
  .hero .lab{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .hero .net{
    font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-.02em;line-height:1;
    font-size:clamp(40px,12vw,58px);margin:10px 0 0;color:var(--accent);
    text-shadow:0 0 28px rgba(96,165,250,0.32);transition:color .2s;
  }
  .hero .net.neg{color:var(--bad);text-shadow:0 0 28px rgba(226,89,73,0.30);}
  .hero .sub{margin-top:12px;font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;}
  .hero .sub b{color:var(--text);font-weight:600;}

  /* sections */
  .sec{margin-top:22px;}
  .sec-h{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:0 0 10px 2px;}
  .sec-h::before{content:"";display:inline-block;width:16px;height:2px;border-radius:2px;background:var(--accent);vertical-align:middle;margin-right:9px;margin-bottom:3px;}
  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:16px;overflow:hidden;}

  .row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line-soft);}
  .row:last-child{border-bottom:none;}
  .row .name{flex:1;font-size:14px;color:var(--text);}
  .row .name small{display:block;color:var(--faint);font-size:11px;margin-top:2px;letter-spacing:.02em;}

  /* money inputs */
  .money{display:flex;align-items:center;gap:1px;}
  .money .pre{color:var(--faint);font-size:15px;}
  input.val{
    width:120px;text-align:right;background:transparent;border:none;outline:none;
    color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;
    padding:6px 0;border-bottom:1px solid transparent;
  }
  input.val:focus{border-bottom-color:var(--accent);}
  input.val.anchor{font-size:19px;}
  .computed{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;color:var(--text);min-width:96px;text-align:right;}
  .computed.cost{color:var(--muted);}

  /* commission control */
  .comm-control{display:flex;align-items:center;gap:10px;}
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:9px;overflow:hidden;}
  .seg button{background:transparent;border:none;color:var(--faint);font-family:'Space Grotesk',sans-serif;
    font-weight:600;font-size:14px;width:34px;height:32px;cursor:pointer;transition:background .15s,color .15s;}
  .seg button.on{background:var(--accent-soft);color:var(--accent);}
  input.comm-pct{
    width:58px;text-align:right;background:transparent;border:none;outline:none;
    color:var(--accent);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;
    padding:6px 0;border-bottom:1px solid transparent;
  }
  input.comm-pct:focus{border-bottom-color:var(--accent);}

  .rate{
    width:62px;text-align:right;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:8px;
    color:var(--accent);font-size:13px;font-weight:600;padding:6px 8px;outline:none;font-family:'Space Grotesk',sans-serif;
  }
  .rate:focus{border-color:var(--accent);}

  /* toggles */
  .toggle{display:flex;align-items:center;gap:8px;margin:14px 2px 0;background:none;border:none;
    color:var(--accent);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:6px 0;}
  .toggle .chev{transition:transform .2s;}
  .toggle.open .chev{transform:rotate(90deg);}
  .rates-body{display:flex;flex-direction:column;gap:12px;padding:14px 16px;}
  .rline{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .rline span{font-size:13px;color:var(--muted);}

  /* comparison */
  .chips{display:flex;gap:6px;}
  .chip{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:8px;color:var(--muted);
    font-size:12px;font-weight:600;padding:7px 11px;cursor:pointer;font-family:'Inter',sans-serif;}
  .chip:active{border-color:var(--accent);color:var(--accent);}
  .cmp{display:flex;gap:10px;margin-top:4px;}
  .cmp-col{flex:1;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:14px;padding:14px;}
  .cmp-col.alt{border-color:var(--line);}
  .cmp-col .cl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .cmp-col .cp{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--muted);margin-top:4px;}
  .cmp-col .cn{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(21px,6.5vw,27px);
    letter-spacing:-.02em;margin-top:8px;color:var(--accent);}
  .cmp-col .cn.neg{color:var(--bad);}
  .cmp-col .cpct{font-size:11px;color:var(--faint);margin-top:5px;}
  .cmp-delta{margin-top:12px;text-align:center;font-size:13px;color:var(--muted);}
  .cmp-delta b{font-family:'Space Grotesk',sans-serif;color:var(--text);font-weight:600;}
  .cmp-empty{margin-top:6px;text-align:center;font-size:12px;color:var(--faint);}

  /* summary */
  .summary{margin-top:22px;padding:18px 16px;border-radius:16px;background:var(--panel);border:1px solid var(--line-soft);}
  .sline{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:14px;color:var(--muted);}
  .sline b{font-family:'Space Grotesk',sans-serif;color:var(--text);font-weight:600;}
  .sline.total{border-top:1px solid var(--line);margin-top:6px;padding-top:14px;color:var(--text);font-weight:600;}
  .sline.total .v{color:var(--accent);font-size:18px;}
  .sline.total .v.neg{color:var(--bad);}
  .sline.pct{padding-top:4px;font-size:12px;color:var(--faint);}

  .foot{margin-top:18px;font-size:11px;line-height:1.6;color:var(--faint);padding:0 2px;}
  .share-btn{margin-top:20px;width:100%;background:var(--accent-soft);border:1px solid var(--line);color:var(--accent);
    border-radius:12px;padding:14px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
  .share-btn:active{background:rgba(96,165,250,0.16);}
  .save-tip{margin-top:8px;text-align:center;font-size:11px;color:var(--faint);}
  .fub-btn{margin-top:10px;width:100%;background:transparent;border:1px solid var(--line-soft);color:var(--muted);
    border-radius:12px;padding:13px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .fub-btn:active{border-color:var(--accent);color:var(--accent);}
  .fub-btn.done{border-color:var(--line);color:var(--accent);}
  .fub-text{margin-top:10px;width:100%;height:210px;background:var(--panel);border:1px solid var(--line-soft);
    border-radius:12px;color:var(--text);font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.65;
    padding:14px;resize:vertical;outline:none;}
  .fub-text:focus{border-color:var(--accent);}
  .link-box{margin-top:10px;width:100%;background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;
    color:var(--accent);font-family:ui-monospace,Menlo,monospace;font-size:12px;padding:13px;outline:none;}
  .link-box:focus{border-color:var(--accent);}
  .moveup-result{margin-top:4px;padding:16px;border-radius:12px;background:var(--accent-soft);border:1px solid var(--line);text-align:center;}
  .moveup-result .lab{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .moveup-result .big{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-.02em;
    font-size:clamp(28px,9vw,36px);color:var(--accent);margin-top:6px;}
  .moveup-result .det{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.7;}
  .moveup-result .det b{color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600;}
  .credit{margin-top:22px;padding-top:16px;border-top:1px solid var(--line-soft);text-align:center;
    font-size:12px;color:var(--muted);line-height:1.7;letter-spacing:.01em;}
  .reset{margin-top:10px;width:100%;background:transparent;border:1px solid var(--line-soft);color:var(--muted);
    border-radius:12px;padding:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .reset:active{border-color:var(--accent);color:var(--accent);}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}

  /* SAVE AS PDF — html2pdf captures this light skin (works inside sandboxed iframes) */
  body.printing{
    --bg:#ffffff; --panel:#ffffff; --panel-2:#f5f7fa;
    --line:rgba(37,99,235,0.35); --line-soft:#e4e8ee;
    --text:#0E1116; --muted:#555b66; --faint:#878d97;
    --accent:#2563EB; --accent-soft:rgba(37,99,235,0.08);
    background:#fff;
  }
  body.printing .no-print{display:none!important;}
  body.printing .hero::after{display:none;}
  body.printing .hero .net{text-shadow:none;}
  body.printing .card,
  body.printing .hero,
  body.printing .summary,
  body.printing .cmp-col{break-inside:avoid;}

  /* PRINT — flip to a clean light document for paper / PDF / forwarding */
  @media print{
    @page{margin:0.5in;}
    :root{
      --bg:#ffffff; --panel:#ffffff; --panel-2:#f5f7fa;
      --line:rgba(37,99,235,0.35); --line-soft:#e4e8ee;
      --text:#0E1116; --muted:#555b66; --faint:#878d97;
      --accent:#2563EB; --accent-soft:rgba(37,99,235,0.08);
    }
    body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .wrap{max-width:none;padding:0;}
    .no-print{display:none!important;}
    .hero{margin-top:16px;}
    .hero::after{display:none;}
    .hero .net{text-shadow:none;}
    .cmp-col{break-inside:avoid;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="text/babel">
const { useState } = React;

const DEFAULTS = {
  listMode: "pct", listPct: "3",
  buyMode:  "pct", buyPct:  "3",
  transferRate: "1.10",  // $ per $1,000 (CA / Kern documentary transfer tax)
  escrowPerK:   "2.00",  // $ per $1,000 (seller escrow estimate)
  titlePerK:    "1.30",  // $ per $1,000 (owner's title policy estimate)
  warranty:     "600",
  downPct:      "20",    // next-home down payment %
  rate:         "6.75",  // next-home interest rate % (editable)
};

const num = (s) => {
  const n = parseFloat(String(s).replace(/[^0-9.]/g, ""));
  return isNaN(n) ? 0 : n;
};
const usd0 = (n) =>
  (n < 0 ? "-" : "") + "$" + Math.abs(Math.round(n)).toLocaleString("en-US");
const fmtPct = (n) => (Math.round(n * 100) / 100).toString() + "%";
const TODAY = new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });

// URL state — a link can pre-fill the sheet (and powers shareable links)
const PARAMS = (() => { try { return new URLSearchParams(window.location.search); } catch (e) { return new URLSearchParams(); } })();
const gp = (k, d) => { const v = PARAMS.get(k); return (v === null || v === undefined) ? d : v; };

function MoneyInput({ value, onChange, anchor }) {
  return (
    <span className="money">
      <span className="pre">$</span>
      <input
        className={"val" + (anchor ? " anchor" : "")}
        inputMode="decimal" placeholder="0"
        value={value} onChange={(e) => onChange(e.target.value)}
      />
    </span>
  );
}

function CommissionRow({ label, mode, setMode, pct, setPct, dollar, setDollar, sub }) {
  return (
    <div className="row">
      <div className="name">{label} <small>{sub}</small></div>
      <div className="comm-control">
        <div className="seg no-print">
          <button className={mode === "pct" ? "on" : ""} onClick={() => setMode("pct")}>%</button>
          <button className={mode === "dollar" ? "on" : ""} onClick={() => setMode("dollar")}>$</button>
        </div>
        {mode === "pct"
          ? <input className="comm-pct" inputMode="decimal" placeholder="0"
              value={pct} onChange={(e) => setPct(e.target.value)} />
          : <MoneyInput value={dollar} onChange={setDollar} />}
      </div>
    </div>
  );
}

function App() {
  const [addr, setAddr] = useState(gp("a", ""));
  const [price, setPrice] = useState(gp("p", ""));
  const [payoff1, setPayoff1] = useState(gp("m1", ""));
  const [payoff2, setPayoff2] = useState(gp("m2", ""));

  // commission — listing side + buyer-agent offered, each %/$ toggleable
  const [listMode, setListMode] = useState(gp("lm", DEFAULTS.listMode));
  const [listPct, setListPct] = useState(gp("lp", DEFAULTS.listPct));
  const [listDollar, setListDollar] = useState(gp("ld", ""));
  const [buyMode, setBuyMode] = useState(gp("bm", DEFAULTS.buyMode));
  const [buyPct, setBuyPct] = useState(gp("bp", DEFAULTS.buyPct));
  const [buyDollar, setBuyDollar] = useState(gp("bd", ""));

  // add-on costs
  const [warranty, setWarranty] = useState(gp("w", DEFAULTS.warranty));
  const [concessions, setConcessions] = useState(gp("cc", ""));
  const [hoa, setHoa] = useState(gp("h", ""));
  const [misc, setMisc] = useState(gp("mi", ""));

  // rates
  const [transferRate, setTransferRate] = useState(gp("tr", DEFAULTS.transferRate));
  const [escrowPerK, setEscrowPerK] = useState(gp("ek", DEFAULTS.escrowPerK));
  const [titlePerK, setTitlePerK] = useState(gp("tk", DEFAULTS.titlePerK));
  const [showRates, setShowRates] = useState(false);

  // comparison
  const [compareOn, setCompareOn] = useState(false);
  const [price2, setPrice2] = useState(gp("p2", ""));

  // move-up (net into next home)
  const [moveOn, setMoveOn] = useState(false);
  const [nextCash, setNextCash] = useState("");
  const [downPct, setDownPct] = useState(gp("dp", DEFAULTS.downPct));
  const [rate, setRate] = useState(gp("r", DEFAULTS.rate));

  // pdf
  const [saving, setSaving] = useState(false);

  // fub copy
  const [copied, setCopied] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const [summaryText, setSummaryText] = useState("");

  // share link
  const [linkCopied, setLinkCopied] = useState(false);
  const [showLink, setShowLink] = useState(false);
  const [shareUrl, setShareUrl] = useState("");

  const payoffs = num(payoff1) + num(payoff2);

  const calc = (P) => {
    const cList = listMode === "pct" ? P * (num(listPct) / 100) : num(listDollar);
    const cBuy  = buyMode  === "pct" ? P * (num(buyPct)  / 100) : num(buyDollar);
    const commission = cList + cBuy;
    const transferTax = (P / 1000) * num(transferRate);
    const escrow = (P / 1000) * num(escrowPerK);
    const title = (P / 1000) * num(titlePerK);
    const flat = num(warranty) + num(concessions) + num(hoa) + num(misc);
    const costs = commission + transferTax + escrow + title + flat;
    const net = P - payoffs - costs;
    return { P, cList, cBuy, commission, transferTax, escrow, title, costs, net };
  };

  const P = num(price);
  const m = calc(P);
  const neg = m.net < 0;
  const netPct = P > 0 ? (m.net / P) * 100 : 0;

  const P2 = num(price2);
  const m2 = calc(P2);
  const neg2 = m2.net < 0;
  const netPct2 = P2 > 0 ? (m2.net / P2) * 100 : 0;
  const delta = m2.net - m.net;
  const bothPrices = P > 0 && P2 > 0;

  // move-up math: equity -> buying power on the next home
  const cashUse = nextCash.trim() !== "" ? num(nextCash) : Math.max(0, m.net);
  const dp = num(downPct);
  const nextPrice = dp > 0 ? cashUse / (dp / 100) : 0;
  const nextLoan = Math.max(0, nextPrice - cashUse);
  const mRate = num(rate) / 100 / 12;
  const nPmts = 360;
  const nextPI = mRate > 0
    ? nextLoan * mRate * Math.pow(1 + mRate, nPmts) / (Math.pow(1 + mRate, nPmts) - 1)
    : nextLoan / nPmts;

  const subList = listMode === "pct"
    ? usd0(m.cList) + " · " + (listPct || 0) + "% of price"
    : fmtPct(P > 0 ? (m.cList / P) * 100 : 0) + " effective";
  const subBuy = buyMode === "pct"
    ? usd0(m.cBuy) + " · " + (buyPct || 0) + "% of price"
    : fmtPct(P > 0 ? (m.cBuy / P) * 100 : 0) + " effective";

  const setPct2 = (factor) => { if (P > 0) setPrice2(String(Math.round(P * factor))); };

  const handleSave = () => {
    if (saving) return;
    const lib = window.html2pdf;
    if (!lib) { try { window.print(); } catch (e) {} return; }
    setSaving(true);
    document.body.classList.add("printing");
    window.scrollTo(0, 0);
    const slug = addr.trim().replace(/[^a-z0-9]+/gi, "-").replace(/^-+|-+$/g, "");
    const opt = {
      margin: 0.4,
      filename: "Seller-Net-Sheet" + (slug ? "-" + slug : "") + ".pdf",
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: { scale: 2, backgroundColor: "#ffffff", useCORS: true, scrollY: 0 },
      jsPDF: { unit: "in", format: "letter", orientation: "portrait" },
      pagebreak: { mode: ["avoid-all", "css"] },
    };
    const done = () => { document.body.classList.remove("printing"); setSaving(false); };
    lib().set(opt).from(document.querySelector(".wrap")).save()
      .then(done)
      .catch(() => { done(); try { window.print(); } catch (e) {} });
  };

  const buildSummary = () => {
    const L = [];
    L.push("SELLER NET SHEET — " + (addr.trim() || "—"));
    L.push("Prepared " + TODAY + " · Mark Allen, DRE# 01933129");
    L.push("");
    L.push("Sale price: " + usd0(P));
    L.push("Loan payoffs: " + usd0(payoffs));
    L.push("Total selling costs: " + usd0(m.costs));
    L.push((neg ? "CASH TO CLOSE: " : "NET TO SELLER: ") + usd0(m.net) + " (" + fmtPct(netPct) + " of sale)");
    L.push("");
    L.push("— Cost breakdown —");
    L.push("Listing fee: " + usd0(m.cList) + (listMode === "pct" ? " (" + (listPct || 0) + "%)" : ""));
    L.push("Buyer agent offered: " + usd0(m.cBuy) + (buyMode === "pct" ? " (" + (buyPct || 0) + "%)" : ""));
    L.push("Transfer tax: " + usd0(m.transferTax));
    L.push("Escrow (seller's ½): " + usd0(m.escrow));
    L.push("Owner's title: " + usd0(m.title));
    L.push("Home warranty: " + usd0(num(warranty)));
    L.push("Buyer concessions: " + usd0(num(concessions)));
    L.push("HOA transfer/demand: " + usd0(num(hoa)));
    L.push("Repairs/misc: " + usd0(num(misc)));
    if (compareOn && bothPrices) {
      L.push("");
      L.push("If sold at " + usd0(P2) + ": net " + usd0(m2.net) + " (" + fmtPct(netPct2) + "), "
        + usd0(Math.abs(delta)) + (delta < 0 ? " less" : " more"));
    }
    return L.join("\n");
  };

  const handleCopy = () => {
    const text = buildSummary();
    setSummaryText(text);
    setShowSummary(true);
    const flash = () => { setCopied(true); setTimeout(() => setCopied(false), 2500); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(flash).catch(() => {});
    } else {
      try {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta); flash();
      } catch (e) {}
    }
  };

  const copyText = (text, flash) => {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(flash).catch(() => {});
    } else {
      try {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta); flash();
      } catch (e) {}
    }
  };

  const buildLink = () => {
    let base;
    try { base = window.location.origin + window.location.pathname; } catch (e) { base = ""; }
    const q = new URLSearchParams();
    const add = (k, v, d) => {
      if (v !== undefined && v !== null && String(v).trim() !== "" && String(v) !== String(d)) q.set(k, v);
    };
    add("a", addr, ""); add("p", price, ""); add("m1", payoff1, ""); add("m2", payoff2, "");
    add("lm", listMode, DEFAULTS.listMode); add("lp", listPct, DEFAULTS.listPct); add("ld", listDollar, "");
    add("bm", buyMode, DEFAULTS.buyMode); add("bp", buyPct, DEFAULTS.buyPct); add("bd", buyDollar, "");
    add("w", warranty, DEFAULTS.warranty); add("cc", concessions, ""); add("h", hoa, ""); add("mi", misc, "");
    add("tr", transferRate, DEFAULTS.transferRate); add("ek", escrowPerK, DEFAULTS.escrowPerK); add("tk", titlePerK, DEFAULTS.titlePerK);
    add("p2", price2, ""); add("dp", downPct, DEFAULTS.downPct); add("r", rate, DEFAULTS.rate);
    const qs = q.toString();
    return base + (qs ? "?" + qs : "");
  };

  const handleShareLink = () => {
    const url = buildLink();
    setShareUrl(url);
    setShowLink(true);
    copyText(url, () => { setLinkCopied(true); setTimeout(() => setLinkCopied(false), 2500); });
  };

  const reset = () => {
    setAddr(""); setPrice(""); setPayoff1(""); setPayoff2("");
    setListMode(DEFAULTS.listMode); setListPct(DEFAULTS.listPct); setListDollar("");
    setBuyMode(DEFAULTS.buyMode); setBuyPct(DEFAULTS.buyPct); setBuyDollar("");
    setWarranty(DEFAULTS.warranty); setConcessions(""); setHoa(""); setMisc("");
    setTransferRate(DEFAULTS.transferRate); setEscrowPerK(DEFAULTS.escrowPerK); setTitlePerK(DEFAULTS.titlePerK);
    setCompareOn(false); setPrice2(""); setShowRates(false);
    setMoveOn(false); setNextCash(""); setDownPct(DEFAULTS.downPct); setRate(DEFAULTS.rate);
    setShowLink(false); setShareUrl(""); setShowSummary(false);
  };

  return (
    <div className="wrap">
      <div className="eyebrow">Mark Allen · DRE# 01933129</div>
      <div className="title">Seller Net Sheet</div>
      <input className="addr" placeholder="Property address (optional)"
        value={addr} onChange={(e) => setAddr(e.target.value)} />
      <div className="prepared">Prepared {TODAY}</div>

      {/* HERO */}
      <div className="hero">
        <div className="lab">Estimated net proceeds</div>
        <div className={"net" + (neg ? " neg" : "")}>{usd0(m.net)}</div>
        <div className="sub">
          <span>on a <b>{usd0(P)}</b> sale</span>
          <span>nets <b>{fmtPct(netPct)}</b></span>
          <span>payoffs <b>{usd0(payoffs)}</b></span>
          <span>costs <b>{usd0(m.costs)}</b></span>
        </div>
      </div>

      {/* THE NUMBERS */}
      <div className="sec">
        <div className="sec-h">The numbers</div>
        <div className="card">
          <div className="row">
            <div className="name">Sale price</div>
            <MoneyInput value={price} onChange={setPrice} anchor />
          </div>
          <div className="row">
            <div className="name">Loan payoff <small>1st mortgage balance</small></div>
            <MoneyInput value={payoff1} onChange={setPayoff1} />
          </div>
          <div className="row">
            <div className="name">Other payoff <small>2nd / HELOC / liens</small></div>
            <MoneyInput value={payoff2} onChange={setPayoff2} />
          </div>
        </div>
      </div>

      {/* COSTS */}
      <div className="sec">
        <div className="sec-h">Estimated selling costs</div>
        <div className="card">
          <CommissionRow label="My listing fee" mode={listMode} setMode={setListMode}
            pct={listPct} setPct={setListPct} dollar={listDollar} setDollar={setListDollar} sub={subList} />
          <CommissionRow label="Buyer agent offered" mode={buyMode} setMode={setBuyMode}
            pct={buyPct} setPct={setBuyPct} dollar={buyDollar} setDollar={setBuyDollar} sub={subBuy} />
          <div className="row">
            <div className="name">Documentary transfer tax <small>${transferRate}/$1,000</small></div>
            <div className="computed cost">{usd0(m.transferTax)}</div>
          </div>
          <div className="row">
            <div className="name">Escrow fee <small>seller's ½ · 50/50 split</small></div>
            <div className="computed cost">{usd0(m.escrow)}</div>
          </div>
          <div className="row">
            <div className="name">Owner's title policy <small>estimate</small></div>
            <div className="computed cost">{usd0(m.title)}</div>
          </div>
          <div className="row">
            <div className="name">Home warranty</div>
            <MoneyInput value={warranty} onChange={setWarranty} />
          </div>
          <div className="row">
            <div className="name">Buyer credit / concessions</div>
            <MoneyInput value={concessions} onChange={setConcessions} />
          </div>
          <div className="row">
            <div className="name">HOA transfer / demand</div>
            <MoneyInput value={hoa} onChange={setHoa} />
          </div>
          <div className="row">
            <div className="name">Repairs / misc</div>
            <MoneyInput value={misc} onChange={setMisc} />
          </div>
        </div>

        <button className={"toggle no-print" + (showRates ? " open" : "")} onClick={() => setShowRates(!showRates)}>
          <span className="chev">▸</span> Adjust rates
        </button>
        {showRates && (
          <div className="card no-print" style={{ marginTop: 8 }}>
            <div className="rates-body">
              <div className="rline"><span>Transfer tax / $1,000</span>
                <span><input className="rate" inputMode="decimal" value={transferRate} onChange={(e)=>setTransferRate(e.target.value)} /></span></div>
              <div className="rline"><span>Escrow / $1,000 (seller's ½)</span>
                <span><input className="rate" inputMode="decimal" value={escrowPerK} onChange={(e)=>setEscrowPerK(e.target.value)} /></span></div>
              <div className="rline"><span>Title / $1,000</span>
                <span><input className="rate" inputMode="decimal" value={titlePerK} onChange={(e)=>setTitlePerK(e.target.value)} /></span></div>
            </div>
          </div>
        )}
      </div>

      {/* SUMMARY */}
      <div className="summary">
        <div className="sline">Sale price <b>{usd0(P)}</b></div>
        <div className="sline">− Loan payoffs <b>{usd0(payoffs)}</b></div>
        <div className="sline">− Selling costs <b>{usd0(m.costs)}</b></div>
        <div className="sline total">
          {neg ? "Cash to close" : "Net to seller"}
          <span className={"v" + (neg ? " neg" : "")}>{usd0(m.net)}</span>
        </div>
        <div className="sline pct">{neg ? "Shortfall" : "Net is " + fmtPct(netPct) + " of sale price"}</div>
      </div>

      {/* PRICE COMPARISON */}
      <div className="sec">
        <button className={"toggle no-print" + (compareOn ? " open" : "")} onClick={() => setCompareOn(!compareOn)}>
          <span className="chev">▸</span> Compare a second price
        </button>
        {compareOn && (
          <div className="card" style={{ marginTop: 8 }}>
            <div className="rates-body">
              <div className="rline">
                <span>Second price</span>
                <MoneyInput value={price2} onChange={setPrice2} />
              </div>
              <div className="chips no-print">
                <button className="chip" onClick={() => setPct2(0.98)}>−2%</button>
                <button className="chip" onClick={() => setPct2(0.97)}>−3%</button>
                <button className="chip" onClick={() => setPct2(0.95)}>−5%</button>
              </div>
              {bothPrices ? (
                <React.Fragment>
                  <div className="cmp">
                    <div className="cmp-col">
                      <div className="cl">List price</div>
                      <div className="cp">{usd0(P)}</div>
                      <div className={"cn" + (neg ? " neg" : "")}>{usd0(m.net)}</div>
                      <div className="cpct">{fmtPct(netPct)} of sale</div>
                    </div>
                    <div className="cmp-col alt">
                      <div className="cl">Second price</div>
                      <div className="cp">{usd0(P2)}</div>
                      <div className={"cn" + (neg2 ? " neg" : "")}>{usd0(m2.net)}</div>
                      <div className="cpct">{fmtPct(netPct2)} of sale</div>
                    </div>
                  </div>
                  <div className="cmp-delta">
                    At {usd0(P2)} you net <b>{usd0(Math.abs(delta))}</b> {delta < 0 ? "less" : "more"}
                  </div>
                </React.Fragment>
              ) : (
                <div className="cmp-empty">Enter a sale price and a second price to compare.</div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* MOVE-UP — net into your next home */}
      <div className="sec no-print">
        <button className={"toggle" + (moveOn ? " open" : "")} onClick={() => setMoveOn(!moveOn)}>
          <span className="chev">▸</span> Net into your next home
        </button>
        {moveOn && (
          <div className="card" style={{ marginTop: 8 }}>
            <div className="rates-body">
              <div className="rline">
                <span>Cash toward next home</span>
                <span className="money">
                  <span className="pre">$</span>
                  <input className="val" inputMode="decimal"
                    placeholder={Math.max(0, Math.round(m.net)).toLocaleString("en-US")}
                    value={nextCash} onChange={(e) => setNextCash(e.target.value)} />
                </span>
              </div>
              <div className="rline"><span>Down payment %</span>
                <span><input className="rate" inputMode="decimal" value={downPct} onChange={(e) => setDownPct(e.target.value)} /></span></div>
              <div className="rline"><span>Interest rate %</span>
                <span><input className="rate" inputMode="decimal" value={rate} onChange={(e) => setRate(e.target.value)} /></span></div>

              <div className="moveup-result">
                <div className="lab">You could buy up to</div>
                <div className="big">{usd0(nextPrice)}</div>
                <div className="det">
                  <b>{usd0(cashUse)}</b> down at <b>{fmtPct(dp)}</b> · new loan <b>{usd0(nextLoan)}</b><br/>
                  est. <b>{usd0(nextPI)}/mo</b> principal &amp; interest
                </div>
              </div>
              <div className="cmp-empty">P&amp;I only — excludes taxes, insurance, HOA, and mortgage insurance.</div>
            </div>
          </div>
        )}
      </div>

      <button className="share-btn no-print" onClick={handleSave} disabled={saving}>
        {saving ? "Saving…" : "Save as PDF"}
      </button>
      <div className="save-tip no-print">On iPhone you can also use Share → Print to save a copy.</div>

      <button className={"fub-btn no-print" + (copied ? " done" : "")} onClick={handleCopy}>
        {copied ? "Copied for FUB ✓" : "Copy summary for FUB"}
      </button>
      {showSummary && (
        <textarea className="fub-text no-print" readOnly value={summaryText}
          onFocus={(e) => e.target.select()} />
      )}

      <button className={"fub-btn no-print" + (linkCopied ? " done" : "")} onClick={handleShareLink}>
        {linkCopied ? "Link copied ✓" : "Copy share link"}
      </button>
      {showLink && (
        <input className="link-box no-print" readOnly value={shareUrl}
          onFocus={(e) => e.target.select()} />
      )}

      <div className="credit">
        370+ homes sold · $166M+ closed<br/>
        Mark Allen · REALTOR® · DRE# 01933129
      </div>

      <div className="foot">
        Estimate only. Escrow and title will confirm exact figures at closing.
        Rates default to Bakersfield / Kern County and are editable under Adjust rates.
      </div>

      <button className="reset no-print" onClick={reset}>Clear &amp; reset</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
